  <style>
    :root {
      --bg:#0c0e14; --surface:#13161f; --surface2:#1a1e2b; --border:#252a3a;
      --accent:#4f8ef7; --accent2:#7c3aed; --gold:#f5c542; --green:#22d3a5;
      --red:#f87171; --text:#e8eaf2; --muted:#6b7280;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 20% 0%,rgba(79,142,247,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(124,58,237,.06) 0%,transparent 60%);pointer-events:none}
    .wrapper{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 20px 60px}
    .header{padding:36px 0 28px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
    .header-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);padding:4px 14px;border-radius:99px;margin-bottom:8px}
    .header h1{font-family:'Syne',sans-serif;font-size:clamp(26px,6vw,44px);font-weight:800;background:linear-gradient(120deg,#e8eaf2 30%,#4f8ef7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
    .header p{color:var(--muted);font-size:14px;margin-top:4px}
    
    .mode-tabs{display:flex;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;width:fit-content;margin:0 auto 28px}
    .mode-tab{cursor:pointer;padding:9px 28px;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;letter-spacing:.03em;border:none;background:transparent;color:var(--muted);transition:all .2s ease}
    .mode-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 18px rgba(79,142,247,.3)}
    
    .selector-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px}
    .sel-wrap{position:relative;flex:1;min-width:200px}
    .sel-wrap label{display:block;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace}
    .sel-wrap select{width:100%;padding:11px 42px 11px 16px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;appearance:none;cursor:pointer;transition:border-color .2s,box-shadow .2s}
    .sel-wrap select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
    .sel-wrap::after{content:'▾';position:absolute;right:14px;bottom:13px;color:var(--muted);pointer-events:none;font-size:12px}
    .reset-btn{padding:11px 20px;background:transparent;border:1px solid rgba(248,113,113,.4);color:var(--red);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .reset-btn:hover{background:rgba(248,113,113,.1);border-color:var(--red)}
    
    /* Stats Layout */
    .stats-row{display:grid; gap:14px; margin-bottom:24px}
    .wrapper.mode-gpa .stats-row { grid-template-columns: 1fr; }
    .wrapper.mode-gpa .cgpa-card { display: none; }
    .wrapper.mode-cgpa .stats-row { grid-template-columns: 1fr; }
    .wrapper.mode-cgpa .gpa-card { display: none; }

    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 26px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(79,142,247,.07)}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .stat-card.gpa-card::before{background:linear-gradient(90deg,var(--accent),#7dd3fc)}
    .stat-card.cgpa-card::before{background:linear-gradient(90deg,var(--green),#34d399)}
    .stat-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

    /* Attractive stat-value: gradient, bold, consistent digits */
    .stat-value{
      font-family:'Syne',sans-serif;
      font-size:56px;
      font-weight:800;
      line-height:1;
      transition:all .3s;
      min-height:60px;
      display:flex;
      align-items:center;
      font-variant-numeric:tabular-nums lining-nums;
      font-feature-settings:"tnum" 1,"lnum" 1;
      letter-spacing:-0.03em;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      width:fit-content;
      filter:drop-shadow(0 0 18px rgba(79,142,247,.35));
    }
    .gpa-card .stat-value{
      background-image:linear-gradient(120deg,#7dd3fc 0%,var(--accent) 50%,#a78bfa 100%);
    }
    .cgpa-card .stat-value{
      font-size:64px;
      min-height:68px;
      background-image:linear-gradient(120deg,#6ee7b7 0%,var(--green) 50%,#34d399 100%);
      filter:drop-shadow(0 0 20px rgba(34,211,165,.35));
    }
    .stat-sub{font-size:12px;color:var(--muted);margin-top:10px}

    .main-progress-wrap{margin-top:22px}
    .progress-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace;display:flex;justify-content:space-between}
    /* Hide text row (label + percentage) in both cards — keep only the bar */
    .cgpa-card .progress-label { display: none; }
    .gpa-card .progress-label { display: none; }
    .progress-bar-bg{background:var(--border);border-radius:99px;height:6px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s ease}
    
    .cgpa-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .sem-ov-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px; transition:all .2s; cursor:pointer;}
    .sem-ov-card:hover{border-color:var(--accent);transform:translateY(-1px)}
    .sem-ov-card.editing{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 15px rgba(79,142,247,.1)}
    .sem-ov-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px; display:flex; justify-content:space-between;}
    .sem-ov-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--accent)}
    .sem-ov-val.empty{color:var(--border)}
    .sem-ov-bar-bg{background:var(--border);border-radius:99px;height:4px;overflow:hidden;margin-top:12px}
    .sem-ov-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s ease}

    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden}
    .table-header-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border)}
    .table-header-bar h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .table-header-bar span{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    thead th{padding:12px 18px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2)}
    tbody tr{border-bottom:1px solid rgba(37,42,58,.6);transition:background .15s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(79,142,247,.04)}
    tbody td{padding:13px 18px;font-size:14px;vertical-align:middle}
    tbody td:first-child{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)}
    tbody td:nth-child(3){font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
    .grade-sel{padding:7px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;appearance:none;cursor:pointer;width:90px;transition:border-color .2s}
    .grade-sel:focus{outline:none;border-color:var(--accent)}
    .grade-sel.go{color:#fbbf24;border-color:rgba(251,191,36,.4)}
    .grade-sel.ga{color:var(--green);border-color:rgba(34,211,165,.3)}
    .grade-sel.gb{color:#60a5fa;border-color:rgba(96,165,250,.3)}
    .grade-sel.gf{color:var(--red);border-color:rgba(248,113,113,.3)}
    .empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:14px;font-family:'DM Mono',monospace}
    
    .bottom-actions{display:flex;justify-content:flex-end;margin-top:16px}
    
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .3s ease both}
    @media(max-width:580px){.stats-row{grid-template-columns:1fr}.selector-row{flex-direction:column}.sel-wrap{min-width:unset;width:100%}.stat-value{font-size:34px !important;min-height:38px !important}.cgpa-card .stat-value{font-size:40px !important;min-height:44px !important}}
  </style>
</head>

  <div id="main-content" style="display:none;">

        </div>
      </div>
      
      <div class="stat-card cgpa-card">
        <div class="stat-label">CGPA</div>
        <div class="stat-value" id="overall-cgpa">—</div>
        <div class="stat-sub" id="cgpa-sub">Calculated up to current semester</div>
        <!-- Progress bar hidden via CSS for cgpa-card -->
        <div class="main-progress-wrap">
          <div class="progress-label"><span id="prog-title-cgpa">Completion</span><span id="prog-pct-cgpa">0%</span></div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill-cgpa" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div id="cgpa-overview-section" style="display:none" class="fade-up">
      <div class="cgpa-overview" id="sem-ov-cards"></div>
    </div>

    <div class="table-wrap fade-up">

      <table>

        <tbody id="course-list"></tbody>
      </table>
    </div>
    
    <div class="bottom-actions fade-up">
      <button class="reset-btn" id="clear-sem-btn">✕ Clear Semester Data</button>
    </div>

  </div>
</div>

var GP = {"O":10,"A+":9,"A":8,"B+":7,"B":6,"C":5,"U":0};

var mode = 'gpa';

var viewState = {
  gpa: { dept: '', sem: '' },
  cgpa: { dept: '', sem: '', editingSem: null }
};

var grades = {};
Object.keys(curriculum).forEach(function(d){
  grades[d] = {};
  for(var s=1;s<=8;s++) grades[d][s] = {};
});

var deptEl = document.getElementById('dept-select');
var semEl  = document.getElementById('semester-select');
var tbody  = document.getElementById('course-list');
var mainContent = document.getElementById('main-content');

function dept(){ return deptEl.value; }
function sem(){  return parseInt(semEl.value); }

function syncDropdowns() {
  deptEl.value = viewState[mode].dept;
  semEl.value = viewState[mode].sem;
}

function saveDropdowns() {
  viewState[mode].dept = deptEl.value;
  viewState[mode].sem = semEl.value;
}

function checkSelections() {
  if (deptEl.value && semEl.value) {
    mainContent.style.display = 'block';
    if (mode === 'cgpa' && viewState.cgpa.editingSem === null) {
        viewState.cgpa.editingSem = sem();
    }
    return true;
  } else {
    mainContent.style.display = 'none';
    return false;
  }
}

function semGpa(d, s){
  var courses = curriculum[d][s] || [];
  var cr=0, pts=0;
  courses.forEach(function(c){
    if(c.cred===0) return;
    var g = grades[d][s][c.code];
    if(g !== undefined && g !== '' && g !== 'U' && GP[g] !== undefined){
      cr+=c.cred; pts+=c.cred*GP[g];
    }
  });
  return cr>0 ? {val:pts/cr, cr:cr} : {val:null, cr:0};
}

function calculateCgpaTill(d, targetSem) {
    var tc=0, tp=0;
    for(var s=1; s<=targetSem; s++) {
        var courses = curriculum[d][s] || [];
        courses.forEach(function(c){
            if(c.cred===0) return;
            var g = grades[d][s][c.code];
            if(g !== undefined && g !== '' && g !== 'U' && GP[g] !== undefined){
                tc += c.cred; tp += c.cred * GP[g];
            }
        });
    }
    return tc>0 ? tp/tc : null;
}

function gradeClass(g){
  if(!g) return '';
  if(g==='O') return 'go';
  if(g==='A+'||g==='A') return 'ga';
  if(g==='B+'||g==='B') return 'gb';
  if(g==='U') return 'gf';
  return '';
}

function updateStats(){
  var d = dept();
  var targetSem = sem();

  var sg = semGpa(d, targetSem);
  var oc = calculateCgpaTill(d, targetSem);

  document.getElementById('top-gpa-label').textContent = 'Semester ' + targetSem + ' GPA';
  document.getElementById('sem-gpa').textContent = sg.val!==null ? sg.val.toFixed(3) : '—';
  document.getElementById('sem-sub').textContent = sg.cr>0 ? sg.cr+' credits graded' : 'No grades entered';
  
  // CGPA: simple label, no "till semester X"
  document.getElementById('overall-cgpa').textContent = oc!==null ? oc.toFixed(2) : '—';
  document.getElementById('cgpa-sub').textContent = oc!==null ? 'Up to Semester ' + targetSem : 'No grades entered';

  // GPA progress bar (with text labels)
  var semArray = (curriculum[d][targetSem]||[]).filter(function(c){return c.cred>0;});
  var totalCourses = semArray.length;
  var totalGraded = semArray.filter(function(c){return grades[d][targetSem][c.code];}).length;
  document.getElementById('prog-title-gpa').textContent = 'Semester ' + targetSem + ' Completion';
  var pct = totalCourses > 0 ? Math.round((totalGraded / totalCourses) * 100) : 0;
  document.getElementById('prog-fill-gpa').style.width = pct+'%';
  document.getElementById('prog-pct-gpa').textContent = pct+'%';

  // CGPA progress bar (bar only, labels hidden via CSS)
  var totalCoursesAll = 0, totalGradedAll = 0;
  for(var i=1; i<=targetSem; i++){
    var arr = (curriculum[d][i]||[]).filter(function(c){return c.cred>0;});
    totalCoursesAll += arr.length;
    totalGradedAll += arr.filter(function(c){return grades[d][i][c.code];}).length;
  }
  var cgpaPct = totalCoursesAll > 0 ? Math.round((totalGradedAll / totalCoursesAll) * 100) : 0;
  document.getElementById('prog-fill-cgpa').style.width = cgpaPct+'%';
}

function renderTable(d, s){
  tbody.innerHTML = '';
  var courses = curriculum[d] && curriculum[d][s] ? curriculum[d][s].filter(function(c){return c.cred>0;}) : [];
  var totalCredits = courses.reduce(function(a,c){return a+c.cred;},0);
  document.getElementById('tbl-title').textContent = 'Semester ' + s + ' Courses';
  document.getElementById('tbl-sub').textContent = courses.length + ' subjects · ' + totalCredits + ' credits';

  if(!courses.length){
    tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No curriculum data.</td></tr>';
    updateStats(); return;
  }

  courses.forEach(function(course, i){
    var saved = (grades[d][s][course.code]) || '';
    var tr = document.createElement('tr');
    tr.style.animationDelay = (i*0.025)+'s';
    tr.className = 'fade-up';

    var opts = '<option value="">—</option>';
    Object.keys(GP).forEach(function(g){
      opts += '<option value="'+g+'"'+(saved===g?' selected':'')+'>'+g+'</option>';
    });

    tr.innerHTML = '<td>'+course.code+'</td>'
      +'<td>'+course.name+'</td>'
      +'<td>'+course.cred+'</td>'
      +'<td><select class="grade-sel '+gradeClass(saved)+'" data-code="'+course.code+'">'+opts+'</select></td>';
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.grade-sel').forEach(function(sel){
    sel.addEventListener('change', function(e){
      var code = e.target.getAttribute('data-code');
      var targetSem = (mode === 'cgpa') ? viewState.cgpa.editingSem : sem();
      grades[dept()][targetSem][code] = e.target.value;
      e.target.className = 'grade-sel '+gradeClass(e.target.value);
      updateStats();
      if(mode==='cgpa') updateOvCards();
    });
  });
  updateStats();
}

function updateOvCards(){
  var d = dept();
  var maxS = sem();
  var container = document.getElementById('sem-ov-cards');
  container.innerHTML = '';
  
  for(var s=1; s<=maxS; s++){
    var sg = semGpa(d, s);
    var semCourses = (curriculum[d][s]||[]).filter(function(c){return c.cred>0;});
    var semTotal = semCourses.length;
    var semGraded = semCourses.filter(function(c){return grades[d][s][c.code];}).length;
    var semPct = semTotal > 0 ? Math.round((semGraded / semTotal) * 100) : 0;
    var card = document.createElement('div');
    card.className = 'sem-ov-card' + (s === viewState.cgpa.editingSem ? ' editing' : '');
    card.innerHTML = '<div class="sem-ov-label"><span>Semester '+s+'</span></div>'
      +'<div class="sem-ov-val'+(sg.val===null?' empty':'')+'">GPA: '+( sg.val!==null ? sg.val.toFixed(3) : '—')+'</div>'
      +'<div class="sem-ov-bar-bg"><div class="sem-ov-bar-fill" style="width:'+semPct+'%"></div></div>';
      
    (function(clickedSem) {
      card.addEventListener('click', function(){
        viewState.cgpa.editingSem = clickedSem;
        updateOvCards();
        renderTable(dept(), viewState.cgpa.editingSem);
        updateStats();
      });
    })(s);

    container.appendChild(card);
  }
}

document.getElementById('tab-gpa').addEventListener('click', function(){
  if(mode==='gpa') return;
  mode='gpa';
  var wrap = document.querySelector('.wrapper');
  wrap.classList.remove('mode-cgpa');
  wrap.classList.add('mode-gpa');
  document.getElementById('tab-gpa').classList.add('active');
  document.getElementById('tab-cgpa').classList.remove('active');
  document.getElementById('cgpa-overview-section').style.display='none';
  syncDropdowns();
  if (checkSelections()) { renderTable(dept(), sem()); }
});

document.getElementById('tab-cgpa').addEventListener('click', function(){
  if(mode==='cgpa') return;
  mode='cgpa';
  var wrap = document.querySelector('.wrapper');
  wrap.classList.remove('mode-gpa');
  wrap.classList.add('mode-cgpa');
  document.getElementById('tab-cgpa').classList.add('active');
  document.getElementById('tab-gpa').classList.remove('active');
  document.getElementById('cgpa-overview-section').style.display='';
  syncDropdowns();
  if (checkSelections()) {
    updateOvCards();
    renderTable(dept(), viewState.cgpa.editingSem);
  }
});

deptEl.addEventListener('change', function(){
  saveDropdowns();
  if (checkSelections()) {
    if(mode==='cgpa') {
        viewState.cgpa.editingSem = sem();
        updateOvCards();
        renderTable(dept(), viewState.cgpa.editingSem);
    } else {
        renderTable(dept(), sem());
    }
  }
});

semEl.addEventListener('change', function(){
  saveDropdowns();
  if (checkSelections()) {
    if(mode==='cgpa') {
        viewState.cgpa.editingSem = sem();
        updateOvCards();
        renderTable(dept(), viewState.cgpa.editingSem);
    } else {
        renderTable(dept(), sem());
    }
  }
});

document.getElementById('reset-btn').addEventListener('click', function(){
  if(confirm('Are you sure you want to reset everything? This will clear all selections and data.')){
    Object.keys(curriculum).forEach(function(d){
      for(var s=1;s<=8;s++) grades[d][s] = {};
    });
    viewState = { gpa: { dept: '', sem: '' }, cgpa: { dept: '', sem: '', editingSem: null } };
    deptEl.value = "";
    semEl.value = "";
    checkSelections();
  }
});

document.getElementById('clear-sem-btn').addEventListener('click', function(){
  var currentTableSem = (mode === 'cgpa') ? viewState.cgpa.editingSem : sem();
  if(confirm('Clear all entered grades for Semester ' + currentTableSem + '?')){
    grades[dept()][currentTableSem] = {};
    if(mode==='cgpa') updateOvCards();
    renderTable(dept(), currentTableSem);
  }
});
</script>
</body>
</html>
